# cert-manager Helm values for AKS
# Ref: https://cert-manager.io/docs/installation/helm/

installCRDs: true

replicaCount: 2

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

# Azure Workload Identity for DNS-01 challenge (Azure DNS)
podLabels:
  azure.workload.identity/use: "true"
serviceAccount:
  annotations:
    azure.workload.identity/client-id: "<CERT_MANAGER_CLIENT_ID>"

webhook:
  replicaCount: 2

cainjector:
  replicaCount: 2

# ClusterIssuer resources — applied separately after install
# See: gitops/argocd/applications/ for the ArgoCD Application that manages these
