# ArgoCD Helm values tuned for Azure AKS
# Ref: https://artifacthub.io/packages/helm/argo/argo-cd

global:
  image:
    tag: "v2.10.0"

server:
  replicas: 2
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
      cert-manager.io/cluster-issuer: letsencrypt-prod
    hosts:
      - argocd.example.com
    tls:
      - secretName: argocd-tls
        hosts:
          - argocd.example.com
  config:
    url: https://argocd.example.com
    repositories: |
      - url: https://dev.azure.com/myorg/kubernetes-utilities/_git/kubernetes-utilities
        type: git
        passwordSecret:
          name: argocd-repo-creds
          key: password
        usernameSecret:
          name: argocd-repo-creds
          key: username

repoServer:
  replicas: 2
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 256Mi

applicationSet:
  enabled: true
  replicas: 2

notifications:
  enabled: true
  secret:
    create: false

configs:
  params:
    server.insecure: false
    application.namespaces: "apps-dev,apps-staging,apps-prod"

  rbac:
    policy.default: role:readonly
    policy.csv: |
      p, role:platform-engineer, applications, *, */*, allow
      p, role:platform-engineer, clusters, get, *, allow
      p, role:platform-engineer, repositories, *, *, allow
      g, aks-platform-engineers, role:platform-engineer
      g, aks-developers, role:readonly
