# Staging overrides for microservice-base
replicaCount: 2

image:
  pullPolicy: IfNotPresent

resources:
  limits:
    cpu: 400m
    memory: 384Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 75

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-staging
  hosts:
    - host: my-service.staging.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: my-service-staging-tls
      hosts:
        - my-service.staging.example.com
